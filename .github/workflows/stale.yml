name: Stale

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 45
          days-before-pr-close: 14
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,security,bug,enhancement,roadmap'
          exempt-pr-labels: 'pinned,security,wip'
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in
            14 days unless updated. Comment to keep open.
          stale-pr-message: >
            This PR has been inactive for 45 days. It will be closed in
            14 days unless updated. Push commits or comment to keep open.
          close-issue-message: 'Closed due to inactivity. Reopen if still relevant.'
          close-pr-message: 'Closed due to inactivity. Reopen when ready to continue.'
